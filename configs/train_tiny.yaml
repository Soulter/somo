batch_size: 32
seq_len: 128
max_steps: 1000
eval_interval: 100
eval_iters: 20
checkpoint_interval: 500
learning_rate: 0.0003
min_lr: 0.00003
warmup_steps: 100
seed: 42
grad_clip: 1.0

data_path: data/tinyshakespeare.txt
checkpoint_path: checkpoints/tiny.pt
resume_path: null

n_layers: 4
n_heads: 4
d_model: 256
dropout: 0.0

tokenizer_path: tokenizers/tiny-bpe.json
tokenizer_vocab_size: 2048
