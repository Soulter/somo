batch_size: 32
seq_len: 128
max_steps: 1000
eval_interval: 100
eval_iters: 20
checkpoint_interval: 500
learning_rate: 0.0003
min_lr: 0.00003
warmup_steps: 100
seed: 42
grad_clip: 1.0
grad_accum_steps: 1
precision: bf16
num_workers: 0
pin_memory: true

checkpoint_path: checkpoints/tiny.pt
resume_path: null

train_datasets:
  - name: tinyshakespeare
    tokenized_path: datasets/tinyshakespeare
    weight: 1.0

eval_datasets:
  - name: tinyshakespeare_eval
    tokenized_path: datasets/tinyshakespeare
    weight: 1.0

n_layers: 4
n_heads: 4
d_model: 256
dropout: 0.0

tokenizer_path: tokenizers/tiny-bpe.json
