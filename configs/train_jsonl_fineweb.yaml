batch_size: 16
seq_len: 128
max_steps: 1000
eval_interval: 100
eval_iters: 10
checkpoint_interval: 500
learning_rate: 0.0003
min_lr: 0.00003
warmup_steps: 100
seed: 42
grad_clip: 1.0

data_source: jsonl
data_path: data/fineweb_sample_100k.jsonl
text_column: text

tokenizer_path: tokenizers/fineweb-8k-bpe.json
tokenizer_vocab_size: 8192
tokenizer_train_max_documents: 100000

checkpoint_path: checkpoints/fineweb-jsonl-tiny.pt
resume_path: null

n_layers: 4
n_heads: 4
d_model: 256
dropout: 0.0
