batch_size: 16
seq_len: 1024
max_steps: 76294
eval_interval: 100
eval_iters: 5
checkpoint_interval: 500
learning_rate: 0.0003
min_lr: 0.00003
warmup_steps: 100
seed: 42
grad_clip: 1.0
grad_accum_steps: 32
precision: bf16
num_workers: 0
pin_memory: true

