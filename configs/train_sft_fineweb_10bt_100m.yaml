train_datasets:
  - name: sft_mixed
    tokenized_path: datasets/sft_mixed
    weight: 1.0

eval_datasets:
  - name: sft_mixed
    tokenized_path: datasets/sft_mixed
    weight: 1.0

tokenizer_path: tokenizers/fineweb-8k-bpe.json

checkpoint_path: checkpoints/sft-fineweb-10bt-100m.pt
resume_path: checkpoints/fineweb-10bt-100m.pt

n_layers: 12
n_heads: 12
d_model: 768
dropout: 0.0

log_dir: runs/sft_fineweb_10bt_100m