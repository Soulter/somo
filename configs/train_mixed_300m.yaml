batch_size: 16
seq_len: 1024
max_steps: 76294
eval_interval: 100
eval_iters: 5
checkpoint_interval: 500
learning_rate: 0.0003
min_lr: 0.00003
warmup_steps: 100
seed: 42
grad_clip: 1.0
grad_accum_steps: 32
precision: bf16
num_workers: 0
pin_memory: true

train_datasets:
  - name: fineweb_edu_train
    tokenized_path: datasets/fineweb_edu_10bt/train
    weight: 0.55
  - name: cci_zh_5m
    tokenized_path: datasets/cci_zh_5m
    weight: 0.25
  - name: nemotron_cc_math_4plus_5m
    tokenized_path: datasets/nemotron_cc_math_4plus_5m
    weight: 0.15
  - name: ultrafineweb_zh_5m
    tokenized_path: datasets/ultrafineweb_zh_5m
    weight: 0.05

eval_datasets:
  - name: fineweb_edu_val
    tokenized_path: datasets/fineweb_edu_10bt/val
    weight: 1.0

tokenizer_path: tokenizers/somo-32k-bpe.json

checkpoint_path: checkpoints/fineweb-mixed-100m.pt
resume_path: null

n_layers: 21
n_heads: 16
d_model: 1024
dropout: 0.0

log_dir: runs/fineweb_mixed_300m
