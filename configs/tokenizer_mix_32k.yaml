seed: 42
shuffle_buffer_size: 10000
tokenizer_path: tokenizers/fineweb-32k-bpe.json
tokenizer_vocab_size: 32768
tokenizer_train_max_documents: 400000

raw_datasets:
  - name: fineweb_edu_train
    data_source: parquet
    data_path: data/fineweb-edu-modelscope/sample/10BT/train/*.parquet
    text_column: text
    weight: 0.6
  - name: cci4_zh_1m
    data_source: jsonl
    data_path: data/samples/pretrain/cci4_zh_1m.jsonl
    text_column: text
    weight: 0.4
